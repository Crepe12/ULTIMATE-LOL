<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL ULTIMATE MASTERY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spiegel:wght@400;700&display=swap');

        :root {
            --gold: #c8aa6e;
            --gold-bright: #f0e6d2;
            --gold-dark: #785a28;
            --blue-dark: #010a13;
            --blue-hextech: #0ac8b9;
            --red-error: #ff4e50;
            --green-success: #00ff88;
            --bg-dark: #091428;
            --border-glow: rgba(200, 170, 110, 0.3);
        }

        body {
            background: radial-gradient(circle at center, var(--bg-dark) 0%, #010a13 100%);
            color: var(--gold-bright);
            font-family: 'Spiegel', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(135deg, rgba(1, 10, 19, 0.95) 0%, rgba(9, 20, 40, 0.95) 100%);
            border: 2px solid var(--gold-dark);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px var(--border-glow);
            padding: 50px 30px;
            text-align: center;
            position: relative;
        }

        /* ตกแต่งมุมกรอบ */
        .container::before, .container::after {
            content: ""; position: absolute; width: 20px; height: 20px;
            border: 2px solid var(--gold);
        }
        .container::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .container::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        h2 {
            font-size: 1.6rem;
            letter-spacing: 10px;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0 0 35px 0;
            text-shadow: 0 0 10px rgba(200, 170, 110, 0.5);
        }

        .timer-container {
            width: 100%;
            height: 3px;
            background: rgba(200, 170, 110, 0.1);
            margin-bottom: 25px;
            box-shadow: 0 0 5px rgba(10, 200, 185, 0.2);
        }
        #timer-bar {
            width: 100%; height: 100%;
            background: var(--blue-hextech);
            box-shadow: 0 0 10px var(--blue-hextech);
        }

        .skill-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            padding: 4px;
            background: var(--gold-dark);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
        }

        .skill-inner {
            width: 100%; height: 100%; background: #000;
            clip-path: polygon(25% 0%, 75% 0%, 100% 25%, 100% 75%, 75% 100%, 25% 100%, 0% 75%, 0% 25%);
        }

        #skill-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.5s ease;
        }

        #status {
            height: 40px;
            font-weight: bold;
            letter-spacing: 4px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid; gap: 15px; margin: 10px 0 30px;
        }

        button {
            background: #1e2328;
            color: var(--gold);
            border: 1px solid var(--gold-dark);
            padding: 18px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            background: #2a2f35;
            border-color: var(--gold-bright);
            color: var(--gold-bright);
            box-shadow: inset 0 0 10px rgba(200, 170, 110, 0.2);
        }

        button:active:not(:disabled) { transform: scale(0.98); }

        button.reveal-correct {
            background: rgba(0, 255, 136, 0.15) !important;
            border: 1px solid var(--green-success) !important;
            color: var(--green-success) !important;
            text-shadow: 0 0 8px var(--green-success);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        button.reveal-wrong {
            background: rgba(255, 78, 80, 0.15) !important;
            border: 1px solid var(--red-error) !important;
            color: var(--red-error) !important;
            opacity: 0.8;
        }

        #next-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(to right, #0596a0, #0ac8b9);
            color: var(--blue-dark);
            border: none;
            font-weight: 900;
            display: none;
            cursor: pointer;
            letter-spacing: 5px;
            box-shadow: 0 5px 15px rgba(10, 200, 185, 0.3);
        }

        .score-board {
            display: flex; justify-content: space-around;
            margin-top: 40px; padding-top: 25px;
            border-top: 1px solid rgba(200, 170, 110, 0.15);
        }

        .score-val { font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .score-label { font-size: 10px; color: var(--gold-dark); letter-spacing: 2px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <!-- หน้าแรก -->
    <div id="setup-screen">
        <h2>ULTIMATE MASTERY</h2>
        <p style="font-size: 12px; color: var(--gold-dark); margin-bottom: 30px; letter-spacing: 2px;">IDENTIFY THE ABILITY</p>
        <div class="options-grid">
            <button onclick="startGame(10)">10 ROUNDS</button>
            <button onclick="startGame(20)">20 ROUNDS</button>
            <button onclick="startGame(50)">50 ROUNDS</button>
        </div>
    </div>

    <!-- หน้าเกม -->
    <div id="game-ui" style="display:none;">
        <div style="font-size: 11px; margin-bottom: 10px; color: var(--gold); letter-spacing: 2px;">
            STREAK: <span id="current-q">1</span> / <span id="total-q">10</span>
        </div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div class="skill-container">
            <div class="skill-inner"><img id="skill-img" src=""></div>
        </div>
        <div id="status"></div>
        <div class="options-grid" id="options"></div>
        <button id="next-btn" onclick="nextQuestion()">INITIATE NEXT</button>
        <div class="score-board">
            <div><span id="correct-count" class="score-val" style="color: var(--blue-hextech);">0</span><span class="score-label">SUCCESS</span></div>
            <div><span id="wrong-count" class="score-val" style="color: var(--red-error);">0</span><span class="score-label">DEFEAT</span></div>
        </div>
    </div>

    <!-- หน้าสรุปผล -->
    <div id="result-screen" style="display:none;">
        <h2 style="margin-bottom: 10px;">MISSION END</h2>
        <div class="score-val" id="final-score" style="font-size: 4rem; color: var(--gold); margin: 20px 0;">0/0</div>
        <div id="rank-text" style="letter-spacing: 6px; font-weight: bold; color: var(--blue-hextech);">RANK: UNKNOWN</div>
        <button onclick="location.reload()" style="width:100%; margin-top:40px; background: var(--gold); color: #000;">RE-ENGAGE</button>
    </div>
</div>

<script>
    const VERSION = "14.9.1";
    let champList = [];
    let ultimatePool = [];
    let correctCount = 0;
    let wrongCount = 0;
    let currentIdx = 0;
    let maxQuestions = 10;
    let currentSkillName = "";
    let timer;

    async function init() {
        try {
            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion.json`);
            const data = await res.json();
            champList = Object.keys(data.data);
            
            const sampleKeys = [...champList].sort(() => 0.5 - Math.random()).slice(0, 45);
            for(let key of sampleKeys) {
                const cRes = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion/${key}.json`);
                const cData = await cRes.json();
                const ult = cData.data[key].spells[3];
                if(ult) ultimatePool.push(ult.name);
            }
        } catch (e) { console.error("Hextech Core Error"); }
    }

    function startGame(num) {
        maxQuestions = num;
        document.getElementById('total-q').innerText = num;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        nextQuestion();
    }

    async function nextQuestion() {
        if(currentIdx >= maxQuestions) return showResults();
        currentIdx++;
        document.getElementById('current-q').innerText = currentIdx;
        document.getElementById('status').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('timer-bar').style.width = "100%";
        
        const img = document.getElementById('skill-img');
        img.style.opacity = "0";

        const randomChamp = champList[Math.floor(Math.random() * champList.length)];
        try {
            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion/${randomChamp}.json`);
            const data = await res.json();
            const ultimate = data.data[randomChamp].spells[3]; 
            currentSkillName = ultimate.name;
            
            img.src = `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/spell/${ultimate.image.full}`;
            
            img.onload = () => {
                img.style.opacity = "1";
                startTimer();
            };

            let choices = new Set([currentSkillName]);
            while(choices.size < 4) { 
                choices.add(ultimatePool[Math.floor(Math.random() * ultimatePool.length)]); 
            }

            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            Array.from(choices).sort(() => Math.random() - 0.5).forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c;
                btn.dataset.skill = c; 
                btn.onclick = () => checkResult(btn);
                optDiv.appendChild(btn);
            });
        } catch (e) { nextQuestion(); }
    }

    function startTimer() {
        clearInterval(timer);
        const bar = document.getElementById('timer-bar');
        let width = 100;
        timer = setInterval(() => {
            width -= 1;
            bar.style.width = width + "%";
            if(width <= 0) { clearInterval(timer); checkResult(null); }
        }, 55); // 5.5 Seconds
    }

    function checkResult(clickedBtn) {
        clearInterval(timer);
        const btns = document.querySelectorAll('#options button');
        const statusEl = document.getElementById('status');
        btns.forEach(b => b.disabled = true);

        const isCorrect = clickedBtn && clickedBtn.dataset.skill === currentSkillName;

        if(isCorrect) {
            clickedBtn.classList.add('reveal-correct');
            correctCount++;
            statusEl.innerText = "ACE";
            statusEl.style.color = "var(--blue-hextech)";
        } else {
            if(clickedBtn) clickedBtn.classList.add('reveal-wrong');
            wrongCount++;
            statusEl.innerText = "EXECUTED";
            statusEl.style.color = "var(--red-error)";
            btns.forEach(b => {
                if(b.dataset.skill === currentSkillName) b.classList.add('reveal-correct');
            });
        }
        
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('wrong-count').innerText = wrongCount;
        document.getElementById('next-btn').style.display = "block";
    }

    function showResults() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${correctCount}/${maxQuestions}`;
        const rate = (correctCount/maxQuestions) * 100;
        let rank = rate >= 90 ? "CHALLENGER" : rate >= 75 ? "DIAMOND" : rate >= 50 ? "GOLD" : "IRON";
        document.getElementById('rank-text').innerText = "RANK: " + rank;
    }

    init();
</script>
</body>
</html>
